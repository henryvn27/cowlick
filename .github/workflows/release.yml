name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semantic version to release, without a v prefix
        required: true
        type: string

concurrency:
  group: cowlick-release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  provenance:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      release_sha: ${{ steps.verify.outputs.release_sha }}
    steps:
      - name: Require a protected-main dispatch
        run: |
          if [[ "$GITHUB_REF" != 'refs/heads/main' ]]; then
            printf 'Release workflow must be dispatched from main, not %s\n' "$GITHUB_REF" >&2
            exit 1
          fi
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: main
          fetch-depth: 1
      - id: verify
        name: Require the exact current main commit
        run: |
          git fetch --no-tags origin '+refs/heads/main:refs/remotes/origin/main' --depth=1
          release_sha="$(./Scripts/verify_release_provenance.sh "$GITHUB_SHA" refs/remotes/origin/main)"
          printf 'release_sha=%s\n' "$release_sha" >> "$GITHUB_OUTPUT"

  validate:
    needs: provenance
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  release:
    needs: [provenance, validate]
    runs-on: macos-15
    timeout-minutes: 120
    environment: release
    permissions:
      contents: write
    env:
      RELEASE_VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ needs.provenance.outputs.release_sha }}
          fetch-depth: 0
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Validate release inputs
        env:
          APPLE_DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
          NOTARY_PRIVATE_KEY_BASE64: ${{ secrets.NOTARY_PRIVATE_KEY_BASE64 }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          version="$RELEASE_VERSION"
          ./Scripts/release_preflight.sh "$version" --source-only
          missing=()
          for variable_name in \
            APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 \
            APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD \
            APPLE_TEAM_ID \
            NOTARY_KEY_ID \
            NOTARY_ISSUER_ID \
            NOTARY_PRIVATE_KEY_BASE64 \
            SPARKLE_PRIVATE_KEY \
            HOMEBREW_TAP_TOKEN; do
            [[ -n "${!variable_name}" ]] || missing+=("$variable_name")
          done
          if (( ${#missing[@]} )); then
            printf 'Missing release secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi
      - name: Import Developer ID certificate
        env:
          CERTIFICATE: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          keychain="$RUNNER_TEMP/cowlick.keychain-db"
          certificate="$RUNNER_TEMP/cowlick.p12"
          echo "$CERTIFICATE" | base64 -D > "$certificate"
          chmod 600 "$certificate"
          security create-keychain -p actions "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p actions "$keychain"
          security import "$certificate" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain"
          security list-keychains -d user -s "$keychain"
          security set-key-partition-list -S apple-tool:,apple: -s -k actions "$keychain"
          echo "NOTARYTOOL_KEYCHAIN=$keychain" >> "$GITHUB_ENV"
      - name: Configure notarization
        env:
          NOTARY_PRIVATE_KEY: ${{ secrets.NOTARY_PRIVATE_KEY_BASE64 }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        run: |
          key="$RUNNER_TEMP/AuthKey.p8"
          echo "$NOTARY_PRIVATE_KEY" | base64 -D > "$key"
          chmod 600 "$key"
          xcrun notarytool store-credentials cowlick-notary --key "$key" --key-id "$NOTARY_KEY_ID" --issuer "$NOTARY_ISSUER_ID" --keychain "$NOTARYTOOL_KEYCHAIN"
      - name: Resolve Developer ID identity
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          identity="$(security find-identity -v -p codesigning | sed -n 's/.*"\(Developer ID Application:[^"]*\)".*/\1/p' | head -1)"
          test -n "$identity"
          [[ "$identity" == *"($APPLE_TEAM_ID)" ]] || {
            printf 'Developer ID identity does not belong to Apple team %s\n' "$APPLE_TEAM_ID" >&2
            exit 1
          }
          echo "DEVELOPER_ID_APPLICATION=$identity" >> "$GITHUB_ENV"
      - name: Build, sign, notarize, and staple
        env:
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
          NOTARYTOOL_PROFILE: cowlick-notary
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: ./Scripts/create_release.sh "$RELEASE_VERSION"
      - name: Require main to remain at the release commit
        run: |
          git fetch --no-tags origin '+refs/heads/main:refs/remotes/origin/main' --depth=1
          ./Scripts/verify_release_provenance.sh \
            '${{ needs.provenance.outputs.release_sha }}' \
            refs/remotes/origin/main >/dev/null
      - name: Create or verify release tag
        run: |
          tag="v$RELEASE_VERSION"
          if git ls-remote --exit-code --refs origin "refs/tags/$tag" >/dev/null 2>&1; then
            git fetch --force origin "refs/tags/$tag:refs/tags/$tag"
            tag_sha="$(git rev-list -n 1 "$tag")"
            if [[ "$tag_sha" != '${{ needs.provenance.outputs.release_sha }}' ]]; then
              printf 'Existing tag %s points to %s, expected %s\n' \
                "$tag" "$tag_sha" '${{ needs.provenance.outputs.release_sha }}' >&2
              exit 1
            fi
          else
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git tag -a "$tag" -m "Cowlick $RELEASE_VERSION" '${{ needs.provenance.outputs.release_sha }}'
            git push origin "refs/tags/$tag"
          fi
      - id: release_state
        name: Create or repair draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="$RELEASE_VERSION"
          tag="v$version"
          release_notes="$RUNNER_TEMP/Cowlick-$version-release-notes.md"
          ./Scripts/release_notes.sh "$version" > "$release_notes"
          assets=(
            "build/release-$version/Cowlick-$version.dmg"
            "build/release-$version/Cowlick-$version.zip"
            "build/release-$version/checksums.txt"
            "build/release-$version/appcast.xml"
          )
          if gh release view "$tag" >/dev/null 2>&1; then
            is_draft="$(gh release view "$tag" --json isDraft --jq .isDraft)"
            if [[ "$is_draft" == true ]]; then
              gh release upload "$tag" "${assets[@]}" --clobber
              gh release edit "$tag" \
                --title "Cowlick $version" \
                --notes-file "$release_notes" \
                --draft=true \
                --prerelease=false
              printf 'state=draft\n' >> "$GITHUB_OUTPUT"
            else
              printf 'Cowlick %s is already public; its assets will not be replaced.\n' \
                "$version"
              printf 'state=published\n' >> "$GITHUB_OUTPUT"
            fi
          else
            gh release create "$tag" "${assets[@]}" \
              --title "Cowlick $version" \
              --notes-file "$release_notes" \
              --draft \
              --verify-tag
            printf 'state=draft\n' >> "$GITHUB_OUTPUT"
          fi
      - name: Verify draft release artifacts
        if: steps.release_state.outputs.state == 'draft'
        env:
          GH_TOKEN: ${{ github.token }}
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          version="$RELEASE_VERSION"
          tag="v$version"
          draft_directory="$RUNNER_TEMP/cowlick-draft-$version"
          mkdir -p "$draft_directory"
          gh release download "$tag" --dir "$draft_directory"
          cmp "build/release-$version/checksums.txt" "$draft_directory/checksums.txt"
          cmp "build/release-$version/appcast.xml" "$draft_directory/appcast.xml"
          ./Scripts/verify_release_artifacts.sh "$version" "$draft_directory"
      - name: Publish verified GitHub release
        if: steps.release_state.outputs.state == 'draft'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v$RELEASE_VERSION"
          [[ "$(gh release view "$tag" --json isDraft --jq .isDraft)" == true ]]
          gh release edit "$tag" --draft=false --prerelease=false --latest
      - name: Verify public downloads
        env:
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          version="$RELEASE_VERSION"
          tag="v$version"
          public_directory="$RUNNER_TEMP/cowlick-public-$version"
          mkdir -p "$public_directory"
          base_url="https://github.com/henryvn27/cowlick/releases/download/$tag"
          download() {
            curl --fail --location --retry 5 --retry-delay 2 --retry-all-errors \
              --retry-max-time 45 --connect-timeout 15 \
              --proto '=https' --tlsv1.2 "$1" --output "$2"
          }
          for asset in \
            "Cowlick-$version.dmg" \
            "Cowlick-$version.zip" \
            checksums.txt \
            appcast.xml; do
            download "$base_url/$asset" "$public_directory/$asset"
          done
          ./Scripts/verify_release_artifacts.sh "$version" "$public_directory"

          latest_appcast="$public_directory/appcast-latest.xml"
          latest_matches=false
          for attempt in {1..8}; do
            if download \
              "https://github.com/henryvn27/cowlick/releases/latest/download/appcast.xml" \
              "$latest_appcast" \
              && cmp -s "$public_directory/appcast.xml" "$latest_appcast"; then
              latest_matches=true
              break
            fi
            (( attempt < 8 )) || break
            sleep 5
          done
          [[ "$latest_matches" == true ]] \
            || { printf 'latest appcast did not match the release\n' >&2; exit 1; }
          cmp "$public_directory/appcast.xml" "$latest_appcast"
          ./Scripts/render_homebrew_cask.sh "$version" \
            "$public_directory/Cowlick-$version.dmg"
      - name: Verify Homebrew cask and installation
        env:
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          test_tap='cowlick/release-test'
          cleanup() {
            brew uninstall --cask cowlick >/dev/null 2>&1 || true
            brew untap "$test_tap" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          brew tap-new --no-git "$test_tap"
          tap_directory="$(brew --repository "$test_tap")"
          mkdir -p "$tap_directory/Casks"
          cp Config/Homebrew/cowlick.rb "$tap_directory/Casks/cowlick.rb"
          brew audit --cask --strict "$test_tap/cowlick"
          brew install --cask "$test_tap/cowlick"
          app="/Applications/Cowlick.app"
          ./Scripts/release_verify_app.sh "$app" "$RELEASE_VERSION"
      - name: Capture Homebrew tap state
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          endpoint='repos/henryvn27/homebrew-cowlick/contents/Casks/cowlick.rb'
          snapshot="$RUNNER_TEMP/cowlick-tap-snapshot"
          mkdir -p "$snapshot"
          error_file="$snapshot/fetch-error"
          if record="$(gh api "$endpoint" \
            --jq '[.sha, (.content | gsub("\\n"; ""))] | @tsv' 2>"$error_file")"; then
            printf 'present\n' > "$snapshot/state"
            printf '%s\n' "${record%%$'\t'*}" > "$snapshot/sha"
            printf '%s' "${record#*$'\t'}" | base64 -D > "$snapshot/cowlick.rb"
          elif grep -Fq '(HTTP 404)' "$error_file"; then
            printf 'absent\n' > "$snapshot/state"
          else
            cat "$error_file" >&2
            exit 1
          fi
      - id: tap_update
        name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          endpoint='repos/henryvn27/homebrew-cowlick/contents/Casks/cowlick.rb'
          snapshot="$RUNNER_TEMP/cowlick-tap-snapshot"
          desired='Config/Homebrew/cowlick.rb'
          snapshot_state="$(<"$snapshot/state")"
          error_file="$snapshot/update-error"
          current_state=absent
          current_sha=''
          if record="$(gh api "$endpoint" \
            --jq '[.sha, (.content | gsub("\\n"; ""))] | @tsv' 2>"$error_file")"; then
            current_state=present
            current_sha="${record%%$'\t'*}"
            printf '%s' "${record#*$'\t'}" | base64 -D > "$snapshot/current.rb"
            if cmp -s "$desired" "$snapshot/current.rb"; then
              printf 'changed=false\n' >> "$GITHUB_OUTPUT"
              exit 0
            fi
          elif ! grep -Fq '(HTTP 404)' "$error_file"; then
            cat "$error_file" >&2
            exit 1
          fi

          if [[ "$snapshot_state" == present ]]; then
            [[ "$current_state" == present \
              && "$current_sha" == "$(<"$snapshot/sha")" ]] || {
              printf 'Homebrew tap changed after its release snapshot\n' >&2
              exit 1
            }
          elif [[ "$current_state" != absent ]]; then
            printf 'Homebrew tap changed after its release snapshot\n' >&2
            exit 1
          fi

          content="$(base64 < Config/Homebrew/cowlick.rb | tr -d '\n')"
          args=(-X PUT -f message="Update Cowlick to $RELEASE_VERSION" -f content="$content" -f branch=main)
          if [[ "$current_state" == present ]]; then args+=(-f sha="$current_sha"); fi
          : > "$snapshot/changed"
          printf 'changed=true\n' >> "$GITHUB_OUTPUT"
          if ! gh api "$endpoint" "${args[@]}" > "$snapshot/update-response" 2>"$error_file"; then
            cat "$error_file" >&2
          fi

          published=false
          for attempt in {1..6}; do
            if record="$(gh api "$endpoint" \
              --jq '[.sha, (.content | gsub("\\n"; ""))] | @tsv' 2>"$error_file")"; then
              printf '%s' "${record#*$'\t'}" | base64 -D > "$snapshot/published.rb"
              if cmp -s "$desired" "$snapshot/published.rb"; then
                published=true
                break
              fi
            fi
            (( attempt < 6 )) || break
            sleep 3
          done
          [[ "$published" == true ]] || {
            cat "$error_file" >&2
            printf 'Homebrew tap did not publish the verified cask\n' >&2
            exit 1
          }
      - name: Verify canonical Homebrew installation
        env:
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          canonical_tap='henryvn27/cowlick'
          cleanup() {
            brew uninstall --cask cowlick >/dev/null 2>&1 || true
            brew untap "$canonical_tap" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          brew uninstall --cask cowlick >/dev/null 2>&1 || true
          brew untap "$canonical_tap" >/dev/null 2>&1 || true
          brew tap "$canonical_tap"
          tap_directory="$(brew --repository "$canonical_tap")"
          cmp Config/Homebrew/cowlick.rb "$tap_directory/Casks/cowlick.rb"
          brew audit --cask --strict "$canonical_tap/cowlick"
          brew install --cask "$canonical_tap/cowlick"
          ./Scripts/release_verify_app.sh /Applications/Cowlick.app "$RELEASE_VERSION"
      - name: Restore failed publication state
        if: ${{ failure() }}
        env:
          RELEASE_TOKEN: ${{ github.token }}
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          rollback_failed=false
          snapshot="$RUNNER_TEMP/cowlick-tap-snapshot"
          endpoint='repos/henryvn27/homebrew-cowlick/contents/Casks/cowlick.rb'

          if [[ -f "$snapshot/changed" ]]; then
            tap_restored=false
            for attempt in {1..7}; do
              error_file="$snapshot/restore-error"
              current_state=absent
              current_sha=''
              if record="$(GH_TOKEN="$TAP_TOKEN" gh api "$endpoint" \
                --jq '[.sha, (.content | gsub("\\n"; ""))] | @tsv' 2>"$error_file")"; then
                current_state=present
                current_sha="${record%%$'\t'*}"
                printf '%s' "${record#*$'\t'}" | base64 -D > "$snapshot/current-restore.rb"
              elif ! grep -Fq '(HTTP 404)' "$error_file"; then
                cat "$error_file" >&2
                sleep 3
                continue
              fi

              if [[ "$current_state" == present ]] \
                && ! cmp -s Config/Homebrew/cowlick.rb "$snapshot/current-restore.rb" \
                && { [[ "$(<"$snapshot/state")" != present ]] \
                  || ! cmp -s "$snapshot/cowlick.rb" "$snapshot/current-restore.rb"; }; then
                printf 'Homebrew tap changed after Cowlick published its cask; refusing to overwrite it\n' >&2
                break
              fi

              if [[ "$(<"$snapshot/state")" == present ]]; then
                if [[ "$current_state" == present ]] \
                  && cmp -s "$snapshot/cowlick.rb" "$snapshot/current-restore.rb"; then
                  tap_restored=true
                  break
                fi
                content="$(base64 < "$snapshot/cowlick.rb" | tr -d '\n')"
                args=(-X PUT -f message="Restore Cowlick cask after failed release" \
                  -f content="$content" -f branch=main)
                if [[ "$current_state" == present ]]; then args+=(-f sha="$current_sha"); fi
                GH_TOKEN="$TAP_TOKEN" gh api "$endpoint" "${args[@]}" \
                  > "$snapshot/restore-response" 2>"$error_file" || true
              elif [[ "$current_state" == absent ]]; then
                tap_restored=true
                break
              else
                GH_TOKEN="$TAP_TOKEN" gh api "$endpoint" -X DELETE \
                  -f message="Remove Cowlick cask after failed release" \
                  -f sha="$current_sha" -f branch=main \
                  > "$snapshot/restore-response" 2>"$error_file" || true
              fi
              sleep 3
            done
            if [[ "$tap_restored" != true ]]; then
              printf 'Homebrew tap could not be restored after its retry window\n' >&2
              rollback_failed=true
            fi
          fi

          if [[ '${{ steps.release_state.outputs.state }}' == draft ]]; then
            tag="v$RELEASE_VERSION"
            release_demoted=false
            for attempt in {1..6}; do
              GH_TOKEN="$RELEASE_TOKEN" gh release edit "$tag" \
                --draft=true --latest=false >/dev/null 2>&1 || true
              if [[ "$(GH_TOKEN="$RELEASE_TOKEN" gh release view "$tag" \
                --json isDraft --jq .isDraft 2>/dev/null || true)" == true ]]; then
                release_demoted=true
                break
              fi
              sleep 3
            done
            if [[ "$release_demoted" == true ]]; then
              printf 'Cowlick %s returned to draft after a failed publication gate.\n' \
                "$RELEASE_VERSION"
            else
              printf 'Cowlick %s could not be returned to draft after six attempts.\n' \
                "$RELEASE_VERSION" >&2
              rollback_failed=true
            fi
          fi

          [[ "$rollback_failed" == false ]]
