name: Capture branch launch assets

on:
  push:
    branches: [fix/cs-2051-streamline-hook-review]

permissions:
  contents: read

jobs:
  capture:
    runs-on: macos-15
    timeout-minutes: 20
    env:
      COWLICK_XCODE_JOBS: "2"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Install XcodeGen
        run: ./Scripts/install_ci_xcodegen.sh
      - name: Generate project
        run: xcodegen generate
      - name: Build exact branch app
        run: >-
          xcodebuild -project Cowlick.xcodeproj -scheme Cowlick -configuration Debug
          -derivedDataPath DerivedData -destination 'platform=macOS' -jobs "$COWLICK_XCODE_JOBS" build
      - name: Capture and validate launch assets
        run: >-
          ./Scripts/capture_launch_assets.sh
          --app DerivedData/Build/Products/Debug/Cowlick.app
          --source-ref HEAD
      - name: Upload governed assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: cowlick-launch-assets
          path: Assets
          if-no-files-found: error
          retention-days: 1
